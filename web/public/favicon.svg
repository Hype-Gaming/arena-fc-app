<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Arena FC">
  <defs>
    <linearGradient id="hexFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16283a"/>
      <stop offset="1" stop-color="#0a121c"/>
    </linearGradient>
    <linearGradient id="hexEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a4f61f"/>
      <stop offset="1" stop-color="#00d37a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- neon halo -->
  <polygon points="26,8 74,8 98,50 74,92 26,92 2,50"
    fill="#8ce60a" opacity="0.35" filter="url(#glow)"/>

  <!-- hexagon badge -->
  <polygon points="26,8 74,8 98,50 74,92 26,92 2,50"
    fill="url(#hexFill)" stroke="url(#hexEdge)" stroke-width="6" stroke-linejoin="round"/>

  <!-- "A" monogram in brand neon green -->
  <g transform="skewX(-8) translate(6 0)" fill="none" stroke="url(#hexEdge)"
    stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 26 L33 74 M50 26 L67 74"/>
    <path d="M40 58 L60 58"/>
  </g>
</svg>
