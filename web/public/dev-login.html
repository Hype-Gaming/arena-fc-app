<!doctype html>
<!-- THROWAWAY dev helper: logs in via /auth/dev-login (only works when
     ALLOW_DEV_LOGIN=true on the API) and redirects. Used for authenticated
     headless screenshots. Inert in production (endpoint returns 403). -->
<meta charset="utf-8" />
<title>dev login</title>
<script>
  (async () => {
    const p = new URLSearchParams(location.search);
    const email = p.get('email') || 'thiagoemanoel181@gmail.com';
    const to = p.get('to') || '/';
    try {
      const res = await fetch('/api/auth/dev-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const t = await res.json();
      localStorage.setItem('accessToken', t.accessToken);
      localStorage.setItem('refreshToken', t.refreshToken);
      // skip the first-access tutorial overlay in screenshots
      localStorage.setItem('tutorialSeenVersion', '1');
    } catch (e) {
      document.body.textContent = 'dev-login failed: ' + e;
      return;
    }
    location.replace(to);
  })();
</script>
