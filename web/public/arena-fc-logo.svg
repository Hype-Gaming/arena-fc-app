<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 260" fill="none" role="img" aria-label="Arena FC">
  <defs>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" />
    </filter>
  </defs>

  <!-- neon green glow -->
  <ellipse cx="150" cy="130" rx="120" ry="110" fill="#8ce60a" opacity="0.55" filter="url(#neon)" />
  <ellipse cx="600" cy="132" rx="470" ry="52" fill="#8ce60a" opacity="0.28" filter="url(#neon)" />

  <!-- badge -->
  <g transform="translate(78 60) scale(1.4)">
    <polygon points="26,8 74,8 98,50 74,92 26,92 2,50" fill="#ffffff" stroke="#ffffff" stroke-width="9" stroke-linejoin="round" />
    <g transform="skewX(-8) translate(6 0)" stroke="#18232f" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
      <path d="M50 26 L33 74 M50 26 L67 74" />
      <path d="M40 58 L60 58" />
    </g>
  </g>

  <!-- wordmark -->
  <text x="290" y="172" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-style="italic" font-weight="900" font-size="128" letter-spacing="0">
    <tspan fill="#83e60b">ARENA</tspan><tspan dx="18" fill="#ffffff" stroke="#14202b" stroke-width="4" paint-order="stroke">FC</tspan>
  </text>
</svg>
