<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640" role="img" aria-label="Odds Altas — Arena FC">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1e3f"/>
      <stop offset="0.55" stop-color="#0a1730"/>
      <stop offset="1" stop-color="#070f20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#2b6fff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2b6fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6ee42"/>
      <stop offset="1" stop-color="#6fbf07"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ce60a"/>
      <stop offset="1" stop-color="#4f8a06"/>
    </linearGradient>
    <pattern id="hex" width="56" height="48" patternUnits="userSpaceOnUse" patternTransform="scale(1)">
      <path d="M14 0 L42 0 L56 24 L42 48 L14 48 L0 24 Z" fill="none" stroke="#3a6bd6" stroke-opacity="0.14" stroke-width="1.5"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="640" height="640" fill="url(#bg)"/>
  <rect width="640" height="640" fill="url(#hex)"/>
  <rect width="640" height="640" fill="url(#glow)"/>

  <!-- brand -->
  <g transform="translate(320 96)" text-anchor="middle" filter="url(#soft)">
    <g transform="translate(-118 -18)">
      <polygon points="20,2 44,2 56,22 44,42 20,42 8,22" fill="url(#green)"/>
      <path d="M32 14 L24 34 M32 14 L40 34 M27 27 L37 27" fill="none" stroke="#0a1420" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="14" y="14" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" font-style="italic" letter-spacing="1">
      <tspan fill="#8ce60a">ARENA</tspan><tspan fill="#ffffff"> FC</tspan>
    </text>
  </g>

  <!-- title -->
  <g text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" fill="#ffffff" filter="url(#soft)">
    <text x="320" y="232" font-size="104" letter-spacing="2">ODDS</text>
    <text x="320" y="330" font-size="104" letter-spacing="2">ALTAS</text>
  </g>

  <!-- rising bars + arrow -->
  <g transform="translate(150 540)">
    <rect x="0"   y="-70"  width="52" height="70"  rx="8" fill="#1b2f52"/>
    <rect x="70"  y="-120" width="52" height="120" rx="8" fill="#24466f"/>
    <rect x="140" y="-180" width="52" height="180" rx="8" fill="url(#bar)"/>
    <rect x="210" y="-250" width="52" height="250" rx="8" fill="url(#bar)"/>
    <!-- upward arrow -->
    <path d="M18 -86 L104 -140 L176 -200 L250 -292" fill="none" stroke="#a6ee42" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M250 -292 L214 -286 M250 -292 L244 -256" fill="none" stroke="#a6ee42" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- multiplier chips -->
  <g font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">
    <g transform="translate(470 250)">
      <rect x="-44" y="-26" width="88" height="52" rx="26" fill="#0e2038" stroke="#8ce60a" stroke-opacity="0.6" stroke-width="2"/>
      <text x="0" y="8" font-size="30" fill="#a6ee42">10x</text>
    </g>
    <g transform="translate(516 348)">
      <rect x="-48" y="-26" width="96" height="52" rx="26" fill="#0e2038" stroke="#8ce60a" stroke-opacity="0.6" stroke-width="2"/>
      <text x="0" y="8" font-size="30" fill="#a6ee42">50x</text>
    </g>
    <g transform="translate(474 446)">
      <rect x="-56" y="-26" width="112" height="52" rx="26" fill="#0e2038" stroke="#8ce60a" stroke-opacity="0.6" stroke-width="2"/>
      <text x="0" y="8" font-size="30" fill="#a6ee42">100x</text>
    </g>
  </g>
</svg>
