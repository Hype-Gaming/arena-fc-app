# Production overrides for the VPS deploy with an external Postgres database.
#
# Run the stack with BOTH files and the production env file:
#   docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# What it changes vs. the base compose:
# - Containers restart automatically after crashes/reboots.
# - The local Postgres service is moved behind the "local-db" profile, so it is
#   not started in production. The API uses DATABASE_URL from .env.production.
# - API is not published to the host. Nginx reaches it over Compose's internal
#   network, and only nginx is exposed locally on 127.0.0.1:8080.
#
# If 8080 is already taken on the VPS, change it here and point the host nginx
# proxy_pass at the same port.
services:
  postgres:
    profiles:
      - local-db
    restart: unless-stopped
    ports: !override []

  api:
    restart: unless-stopped
    depends_on: !override []
    ports: !override []

  web:
    restart: unless-stopped

  nginx:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:8080:80"
