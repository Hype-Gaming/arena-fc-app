# docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      LASTLINK_WEBHOOK_SECRET: ${LASTLINK_WEBHOOK_SECRET}
      PAYT_WEBHOOK_TOKEN: ${PAYT_WEBHOOK_TOKEN}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      # Espera do "confirmar banca no Telegram" antes de liberar o app (segundos).
      # Vazio = default do código (600s = 10 min).
      TELEGRAM_UNLOCK_WAIT_SECONDS: ${TELEGRAM_UNLOCK_WAIT_SECONDS:-}
      ALLOW_DEV_LOGIN: ${ALLOW_DEV_LOGIN:-false}
      NODE_ENV: ${NODE_ENV}
      # Team crests are cached on disk here; the volume below keeps them across
      # deploys/restarts, and nginx serves the files directly from the same path.
      TEAM_LOGO_CACHE_DIR: ${TEAM_LOGO_CACHE_DIR:-/var/cache/team-logos}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "3000:3000"
    volumes:
      - team-logos:/var/cache/team-logos
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(async (res) => { if (!res.ok) process.exit(1); const body = await res.json(); if (body.status !== 'ok' || body.db !== 'up') process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      # The container applies migrations and runs the idempotent seed before
      # Nest starts listening, so production needs a generous grace period.
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    expose:
      - "80"

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      # Read-only view of the API's crest cache so nginx serves logo PNGs
      # straight from disk, hitting the API only on a cache miss.
      - team-logos:/var/cache/team-logos:ro

volumes:
  pgdata:
  team-logos:
