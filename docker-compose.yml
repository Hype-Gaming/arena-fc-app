# docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      LASTLINK_WEBHOOK_SECRET: ${LASTLINK_WEBHOOK_SECRET}
      PAYT_WEBHOOK_TOKEN: ${PAYT_WEBHOOK_TOKEN}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      ALLOW_DEV_LOGIN: ${ALLOW_DEV_LOGIN:-false}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(async (res) => { if (!res.ok) process.exit(1); const body = await res.json(); if (body.status !== 'ok' || body.db !== 'up') process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      # The container applies migrations and runs the idempotent seed before
      # Nest starts listening, so production needs a generous grace period.
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    expose:
      - "80"

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  pgdata:
