# infra/nginx/nginx.conf
events {}
http {
  # Compress JSON API responses (images are already compressed formats).
  gzip on;
  gzip_types application/json application/javascript text/css text/plain;
  gzip_min_length 1024;

  server {
    listen 80;
    server_name _;

    # Reject oversized bodies early (login/webhook payloads are tiny; this caps
    # abuse without affecting normal requests).
    client_max_body_size 2m;

    # Don't let a hung upstream tie up a connection indefinitely.
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Security headers (apply to inheriting locations; the logos location sets
    # its own Cache-Control and so opts out — fine, images need none of these).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Honored by browsers only over HTTPS. TLS terminates on the host proxy,
    # which forwards this header through. 1 year, include subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Clickjacking protection for the SPA. LEAVE COMMENTED if the app is opened
    # embedded (e.g. a Telegram Mini App / webview) — SAMEORIGIN would block it.
    # Uncomment once you've confirmed the PWA runs standalone.
    # add_header X-Frame-Options "SAMEORIGIN" always;

    # Team crest images: serve the cached PNG straight from the shared volume
    # (no Node round-trip). On a cache miss the file is absent, so fall back to
    # the API @logo_origin, which downloads + caches it; the next hit is a
    # direct file read. More specific than /api/ so it wins for these URLs.
    location /api/team-logos/ {
      alias /var/cache/team-logos/;
      add_header Cache-Control "public, max-age=604800";
      error_page 404 = @logo_origin;
    }

    location @logo_origin {
      rewrite ^/api/team-logos/(.*)$ /team-logos/$1 break;
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API REST
    location /api/ {
      proxy_pass http://api:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment webhooks (spec section 5): POST /webhooks/:provider
    location /webhooks/ {
      proxy_pass http://api:3000/webhooks/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static PWA
    location / {
      proxy_pass http://web:80;
      proxy_set_header Host $host;
    }
  }
}
