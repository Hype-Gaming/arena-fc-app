# infra/nginx/nginx.conf
events {}
http {
  # Compress JSON API responses (images are already compressed formats).
  gzip on;
  gzip_types application/json application/javascript text/css text/plain;
  gzip_min_length 1024;

  server {
    listen 80;
    server_name _;

    # Team crest images: serve the cached PNG straight from the shared volume
    # (no Node round-trip). On a cache miss the file is absent, so fall back to
    # the API @logo_origin, which downloads + caches it; the next hit is a
    # direct file read. More specific than /api/ so it wins for these URLs.
    location /api/team-logos/ {
      alias /var/cache/team-logos/;
      add_header Cache-Control "public, max-age=604800";
      error_page 404 = @logo_origin;
    }

    location @logo_origin {
      rewrite ^/api/team-logos/(.*)$ /team-logos/$1 break;
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API REST
    location /api/ {
      proxy_pass http://api:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment webhooks (spec section 5): POST /webhooks/:provider
    location /webhooks/ {
      proxy_pass http://api:3000/webhooks/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static PWA
    location / {
      proxy_pass http://web:80;
      proxy_set_header Host $host;
    }
  }
}
